# VPS production / UAT stack — routed by Traefik (already running on host)
# Copy env.example to .env.prod and fill in DOMAIN, APP_ENV, and secrets
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pan-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    labels:
      - "traefik.enable=true"
      # Route this domain to port 3000 inside the container
      - "traefik.http.routers.${APP_ENV}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${APP_ENV}.entrypoints=websecure"
      - "traefik.http.routers.${APP_ENV}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_ENV}.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pan-internal
      - traefik-public   # Traefik must be able to reach the app

networks:
  pan-internal:          # app ↔ postgres only
  traefik-public:
    external: true       # already created by Traefik on this host

volumes:
  postgres_data:
